name: Weekly Maintenance — Monday 7AM Cairo

on:
  schedule:
    # 7:00 AM Cairo (UTC+2) = 05:00 UTC
    - cron: '0 5 * * 1'   # every Monday
  workflow_dispatch:

jobs:
  weekly-maintenance:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Refresh Pinterest OAuth token
        run: node scripts/refresh-pinterest-token.mjs
        env:
          PINTEREST_APP_ID: ${{ secrets.PINTEREST_APP_ID }}
          PINTEREST_APP_SECRET: ${{ secrets.PINTEREST_APP_SECRET }}
          PINTEREST_REFRESH_TOKEN: ${{ secrets.PINTEREST_REFRESH_TOKEN }}
        continue-on-error: true   # don't block other steps if Pinterest fails

      - name: Refresh intelligence pools (competitor + trend research)
        run: node scripts/intelligence-refresh.mjs && node scripts/apply-intelligence.mjs
        env:
          VERTEX_API_KEY: ${{ secrets.VERTEX_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        continue-on-error: true

      - name: Collect trends
        run: node scripts/collect-trends.mjs
        env:
          VERTEX_API_KEY: ${{ secrets.VERTEX_API_KEY }}
        continue-on-error: true

      - name: Commit updated config pools
        run: |
          git config user.name "JoyMaze Bot"
          git config user.email "bot@joymaze.com"
          git add config/content-intelligence.json config/theme-pool-dynamic.json \
                  config/hooks-library.json config/cta-library.json \
                  config/pattern-interrupt-dynamic.json config/trends-this-week.json
          git diff --staged --quiet || git commit -m "chore: weekly intelligence + trend refresh $(date +%Y-%m-%d) [skip ci]"
          git push
